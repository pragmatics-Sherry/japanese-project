<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japanese Sketto</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&family=DotGothic16&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C0392B;
    --cream: #FDF6EC;
    --ink: #1a1208;
    --gold: #B8860B;
    --light-gold: #F5DEB3;
    --muted: #8B7355;
    --correct: #2E7D32;
    --wrong: #C0392B;
    --card-bg: #FFFDF8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(180,150,100,0.12) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(180,150,100,0.07) 40px);
  }

  /* HEADER */
  .header {
    width: 100%;
    background: var(--ink);
    color: var(--cream);
    text-align: center;
    padding: 18px 20px 14px;
    position: relative;
  }
  .header-jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 2rem;
    letter-spacing: 0.15em;
    color: #fff;
  }
  .header-sub {
    font-size: 0.75rem;
    color: var(--light-gold);
    letter-spacing: 0.25em;
    margin-top: 2px;
    text-transform: uppercase;
  }
  .header-stripe {
    width: 100%;
    height: 5px;
    background: repeating-linear-gradient(90deg, var(--red) 0, var(--red) 20px, var(--gold) 20px, var(--gold) 40px, var(--ink) 40px, var(--ink) 60px);
  }

  /* MAIN CONTAINER */
  .container {
    width: 100%;
    max-width: 520px;
    padding: 28px 16px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  /* SCREEN MANAGEMENT */
  .screen { display: none; width: 100%; flex-direction: column; align-items: center; gap: 18px; }
  .screen.active { display: flex; }

  /* START SCREEN */
  .mode-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.1rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.1em;
  }
  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
  }
  .mode-card {
    background: var(--card-bg);
    border: 2px solid var(--ink);
    border-radius: 0;
    padding: 20px 12px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 4px 4px 0 var(--ink);
    position: relative;
  }
  .mode-card:hover { background: var(--light-gold); transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
  .mode-card.selected { background: var(--ink); color: var(--cream); box-shadow: 2px 2px 0 var(--gold); }
  .mode-card.selected .mode-icon { color: var(--light-gold); }
  .mode-icon { font-size: 2rem; margin-bottom: 6px; }
  .mode-name { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.05em; }
  .mode-desc { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
  .mode-card.selected .mode-desc { color: var(--light-gold); }

  .count-row {
    display: flex; align-items: center; gap: 14px; width: 100%; justify-content: center;
  }
  .count-label { font-size: 0.85rem; color: var(--muted); }
  .count-btn {
    width: 36px; height: 36px; border: 2px solid var(--ink); background: var(--card-bg);
    font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 3px 3px 0 var(--ink); font-weight: 700;
  }
  .count-btn:hover { background: var(--light-gold); }
  .count-display {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.6rem; font-weight: 700; min-width: 40px; text-align: center;
  }

  .start-btn {
    width: 100%; padding: 16px;
    background: var(--red); color: #fff;
    border: 2px solid var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 1rem; font-weight: 700;
    cursor: pointer; letter-spacing: 0.15em;
    box-shadow: 5px 5px 0 var(--ink);
    transition: transform 0.1s, box-shadow 0.1s;
    text-transform: uppercase;
  }
  .start-btn:hover { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--ink); }
  .start-btn:active { transform: translate(2px,2px); box-shadow: 3px 3px 0 var(--ink); }

  /* PROGRESS BAR */
  .progress-wrap { width: 100%; }
  .progress-info { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted); margin-bottom: 5px; }
  .progress-bar { width: 100%; height: 8px; background: #DDD; border: 1px solid #BBB; }
  .progress-fill { height: 100%; background: var(--red); transition: width 0.4s ease; }

  /* QUESTION CARD */
  .q-card {
    width: 100%;
    background: var(--card-bg);
    border: 2px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink);
    padding: 30px 24px 22px;
    text-align: center;
    position: relative;
  }
  .q-badge {
    position: absolute; top: -12px; left: 16px;
    background: var(--red); color: #fff;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
    padding: 2px 10px; border: 1.5px solid var(--ink);
  }
  .q-type-label {
    font-size: 0.72rem; color: var(--muted); letter-spacing: 0.2em;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .q-main {
    font-family: 'Noto Serif JP', serif;
    font-size: 3.5rem; line-height: 1.2;
    color: var(--ink); margin-bottom: 6px;
  }
  .q-hint { font-size: 0.8rem; color: var(--muted); font-style: italic; }

  /* OPTIONS */
  .options-grid { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .opt-btn {
    padding: 14px 10px;
    background: var(--card-bg);
    border: 2px solid var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.92rem; font-weight: 400;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink);
    transition: all 0.12s;
    text-align: center; line-height: 1.3;
  }
  .opt-btn:hover:not(:disabled) { background: var(--light-gold); transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
  .opt-btn.correct { background: #C8E6C9; border-color: var(--correct); box-shadow: 3px 3px 0 var(--correct); color: var(--correct); font-weight: 700; }
  .opt-btn.wrong { background: #FFCDD2; border-color: var(--wrong); box-shadow: 3px 3px 0 var(--wrong); color: var(--wrong); }
  .opt-btn:disabled { cursor: default; }

  /* FEEDBACK */
  .feedback {
    width: 100%; padding: 12px 16px;
    border: 2px solid var(--ink);
    font-size: 0.88rem; font-weight: 700;
    text-align: center; letter-spacing: 0.05em;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: #C8E6C9; color: var(--correct); }
  .feedback.wrong-fb { background: #FFCDD2; color: var(--wrong); }

  .next-btn {
    width: 100%; padding: 13px;
    background: var(--ink); color: var(--cream);
    border: 2px solid var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    cursor: pointer; letter-spacing: 0.1em;
    box-shadow: 4px 4px 0 var(--gold);
    transition: all 0.1s;
    display: none;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { background: #333; }

  /* RESULT SCREEN */
  .result-card {
    width: 100%; background: var(--card-bg);
    border: 2px solid var(--ink); box-shadow: 6px 6px 0 var(--ink);
    padding: 32px 24px; text-align: center;
  }
  .result-jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 3rem; color: var(--red); margin-bottom: 8px;
  }
  .result-score-label { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; }
  .result-score {
    font-family: 'Noto Serif JP', serif;
    font-size: 2.8rem; font-weight: 700; margin: 4px 0;
  }
  .result-msg { font-size: 0.95rem; color: var(--muted); margin-bottom: 20px; }
  .result-breakdown {
    display: flex; justify-content: center; gap: 28px;
    margin: 16px 0 24px;
  }
  .rb-item { text-align: center; }
  .rb-num { font-family: 'Noto Serif JP', serif; font-size: 1.8rem; font-weight: 700; }
  .rb-num.c { color: var(--correct); }
  .rb-num.w { color: var(--wrong); }
  .rb-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; }

  .retry-btn {
    width: 100%; padding: 14px;
    background: var(--red); color: #fff;
    border: 2px solid var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.95rem; font-weight: 700;
    cursor: pointer; letter-spacing: 0.12em;
    box-shadow: 5px 5px 0 var(--ink);
    transition: all 0.1s; margin-bottom: 10px;
  }
  .retry-btn:hover { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--ink); }
  .menu-btn {
    width: 100%; padding: 13px;
    background: var(--card-bg); color: var(--ink);
    border: 2px solid var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    cursor: pointer; letter-spacing: 0.1em;
    box-shadow: 4px 4px 0 var(--ink);
    transition: all 0.1s;
  }
  .menu-btn:hover { background: var(--light-gold); }

  /* WRONG LIST */
  .wrong-list-wrap { width: 100%; }
  .wrong-list-title { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.15em; margin-bottom: 8px; text-transform: uppercase; }
  .wrong-list { display: flex; flex-wrap: wrap; gap: 7px; }
  .wrong-tag {
    background: #FFCDD2; border: 1.5px solid var(--wrong);
    padding: 4px 10px; font-size: 0.82rem; color: var(--wrong); font-weight: 700;
  }

  /* DIVIDER */
  .divider {
    width: 100%; height: 2px;
    background: repeating-linear-gradient(90deg, var(--ink) 0, var(--ink) 8px, transparent 8px, transparent 14px);
  }

  @media (max-width: 400px) {
    .q-main { font-size: 2.8rem; }
    .mode-grid { grid-template-columns: 1fr; }
    .options-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-jp">JAPANESE SKETTO</div>
  <div class="header-sub">일본어 도우미</div>
</div>
<div class="header-stripe"></div>

<div class="container">

  <!-- START SCREEN -->
  <div class="screen active" id="screen-start">
    <div class="mode-title">학습 모드를 선택하세요</div>
    <div class="mode-grid">
      <div class="mode-card selected" data-mode="hiragana" onclick="selectMode(this)">
        <div class="mode-icon">あ</div>
        <div class="mode-name">히라가나</div>
        <div class="mode-desc">문자 → 발음 읽기</div>
      </div>
      <div class="mode-card" data-mode="vocab" onclick="selectMode(this)">
        <div class="mode-icon">語</div>
        <div class="mode-name">단어 암기</div>
        <div class="mode-desc">일본어 → 한국어</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="count-row">
      <span class="count-label">문제 수</span>
      <button class="count-btn" onclick="changeCount(-5)">−</button>
      <div class="count-display" id="count-display">10</div>
      <button class="count-btn" onclick="changeCount(+5)">+</button>
    </div>

    <button class="start-btn" onclick="startQuiz()">시작하기 → START</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="screen-quiz">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="prog-text">1 / 10</span>
        <span id="score-text">점수: 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div class="q-card">
      <div class="q-badge" id="q-badge">QUIZ</div>
      <div class="q-type-label" id="q-type-label">히라가나 읽기</div>
      <div class="q-main" id="q-main">あ</div>
      <div class="q-hint" id="q-hint"></div>
    </div>

    <div class="options-grid" id="options-grid"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">다음 문제 →</button>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="screen-result">
    <div class="result-card">
      <div class="result-jp" id="result-emoji">よくできました！</div>
      <div class="result-score-label">최종 점수</div>
      <div class="result-score" id="result-score">0 / 0</div>
      <div class="result-msg" id="result-msg"></div>
      <div class="divider"></div>
      <div class="result-breakdown">
        <div class="rb-item"><div class="rb-num c" id="rb-correct">0</div><div class="rb-label">정답</div></div>
        <div class="rb-item"><div class="rb-num" style="color:var(--muted)" id="rb-total">0</div><div class="rb-label">전체</div></div>
        <div class="rb-item"><div class="rb-num w" id="rb-wrong">0</div><div class="rb-label">오답</div></div>
      </div>
    </div>

    <div class="wrong-list-wrap" id="wrong-list-wrap" style="display:none">
      <div class="wrong-list-title">틀린 문제</div>
      <div class="wrong-list" id="wrong-list"></div>
    </div>

    <button class="retry-btn" onclick="retryQuiz()">다시 풀기 ↺</button>
    <button class="menu-btn" onclick="goMenu()">← 메인 메뉴</button>
  </div>

</div>

<script>
// ──────────────────────────────────────────────
// DATA
// ──────────────────────────────────────────────
const HIRAGANA = [
  {q:'あ', a:'a'}, {q:'い', a:'i'}, {q:'う', a:'u'}, {q:'え', a:'e'}, {q:'お', a:'o'},
  {q:'か', a:'ka'}, {q:'き', a:'ki'}, {q:'く', a:'ku'}, {q:'け', a:'ke'}, {q:'こ', a:'ko'},
  {q:'さ', a:'sa'}, {q:'し', a:'shi'}, {q:'す', a:'su'}, {q:'せ', a:'se'}, {q:'そ', a:'so'},
  {q:'た', a:'ta'}, {q:'ち', a:'chi'}, {q:'つ', a:'tsu'}, {q:'て', a:'te'}, {q:'と', a:'to'},
  {q:'な', a:'na'}, {q:'に', a:'ni'}, {q:'ぬ', a:'nu'}, {q:'ね', a:'ne'}, {q:'の', a:'no'},
  {q:'は', a:'ha'}, {q:'ひ', a:'hi'}, {q:'ふ', a:'fu'}, {q:'へ', a:'he'}, {q:'ほ', a:'ho'},
  {q:'ま', a:'ma'}, {q:'み', a:'mi'}, {q:'む', a:'mu'}, {q:'め', a:'me'}, {q:'も', a:'mo'},
  {q:'や', a:'ya'}, {q:'ゆ', a:'yu'}, {q:'よ', a:'yo'},
  {q:'ら', a:'ra'}, {q:'り', a:'ri'}, {q:'る', a:'ru'}, {q:'れ', a:'re'}, {q:'ろ', a:'ro'},
  {q:'わ', a:'wa'}, {q:'を', a:'wo'}, {q:'ん', a:'n'},
];

const VOCAB = [
  {q:'あい', a:'사랑'},
  {q:'いえ', a:'집'},
  {q:'うえ', a:'위'},
  {q:'え', a:'그림'},
  {q:'おう', a:'왕'},
  {q:'あお', a:'파랑'},
  {q:'かき', a:'감'},
  {q:'かお', a:'얼굴'},
  {q:'きく', a:'듣다'},
  {q:'いけ', a:'연못'},
  {q:'こえ', a:'목소리'},
  {q:'ここ', a:'여기'},
  {q:'あさ', a:'아침'},
  {q:'しか', a:'사슴'},
  {q:'すし', a:'초밥'},
  {q:'せかい', a:'세계'},
  {q:'そこ', a:'거기'},
  {q:'しお', a:'소금'},
  {q:'たこ', a:'문어'},
  {q:'ちえ', a:'지혜'},
  {q:'つくえ', a:'책상'},
  {q:'て', a:'손'},
  {q:'とき', a:'때'},
  {q:'つき', a:'달'},
  {q:'なに', a:'무엇'},
  {q:'にく', a:'고기'},
  {q:'いぬ', a:'개'},
  {q:'ねこ', a:'고양이'},
  {q:'きのう', a:'어제'},
  {q:'なす', a:'가지'},
  {q:'はな', a:'꽃'},
  {q:'ひふ', a:'피부'},
  {q:'ふく', a:'옷'},
  {q:'へそ', a:'배꼽'},
  {q:'ほし', a:'별'},
  {q:'はい', a:'네/예'},
  {q:'かみさま', a:'하나님'},
  {q:'みそ', a:'된장'},
  {q:'むし', a:'벌레'},
  {q:'め', a:'눈'},
  {q:'うみ', a:'바다'},
  {q:'くも', a:'구름'},
  {q:'やくそく', a:'약속'},
  {q:'ゆき', a:'눈(snow)'},
  {q:'よ', a:'세상'},
  {q:'へや', a:'방'},
  {q:'ゆめ', a:'꿈'},
  {q:'つよい', a:'강하다'},
  {q:'そら', a:'하늘'},
  {q:'ひかり', a:'빛'},
  {q:'はる', a:'봄'},
  {q:'それ', a:'그것'},
  {q:'しろ', a:'흰색'},
  {q:'よる', a:'밤'},
  {q:'わたし', a:'나'},
  {q:'しあわせ', a:'행복'},
  {q:'を', a:'을/를'},
  {q:'ほん', a:'책'},
  {q:'しんこう', a:'믿음'},
];

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let mode = 'hiragana';
let quizCount = 10;
let questions = [];
let current = 0;
let score = 0;
let wrongItems = [];
let answered = false;

// ──────────────────────────────────────────────
// HELPERS
// ──────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function getRandom(arr, n) {
  return shuffle(arr).slice(0, n);
}

function getWrongOptions(pool, correct, count=3) {
  const others = pool.filter(x => x.a !== correct.a);
  return getRandom(others, count).map(x=>x.a);
}

// ──────────────────────────────────────────────
// UI CONTROLS
// ──────────────────────────────────────────────
function selectMode(el) {
  document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  mode = el.dataset.mode;
}

function changeCount(d) {
  quizCount = Math.min(20, Math.max(5, quizCount+d));
  document.getElementById('count-display').textContent = quizCount;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ──────────────────────────────────────────────
// QUIZ LOGIC
// ──────────────────────────────────────────────
function startQuiz() {
  const pool = mode === 'hiragana' ? HIRAGANA : VOCAB;
  questions = getRandom(pool, Math.min(quizCount, pool.length));
  current = 0; score = 0; wrongItems = [];
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  const pool = mode === 'hiragana' ? HIRAGANA : VOCAB;
  const total = questions.length;

  // progress
  document.getElementById('prog-text').textContent = `${current+1} / ${total}`;
  document.getElementById('score-text').textContent = `점수: ${score}`;
  document.getElementById('prog-fill').style.width = `${(current/total)*100}%`;
  document.getElementById('q-badge').textContent = `Q${current+1}`;

  // question display
  if (mode === 'hiragana') {
    document.getElementById('q-type-label').textContent = '히라가나 읽기 — 발음은?';
    document.getElementById('q-main').textContent = q.q;
    document.getElementById('q-hint').textContent = '';
  } else {
    document.getElementById('q-type-label').textContent = '단어 암기 — 한국어 뜻은?';
    document.getElementById('q-main').textContent = q.q;
    document.getElementById('q-hint').textContent = q.hint ? `힌트: ${q.hint}` : '';
  }

  // options
  const wrongs = getWrongOptions(pool, q);
  const opts = shuffle([q.a, ...wrongs]);
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(btn, opt, q.a, q.q);
    grid.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('next-btn').className = 'next-btn';
}

function checkAnswer(btn, chosen, correct, question) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });

  const fb = document.getElementById('feedback');
  if (chosen === correct) {
    score++;
    btn.classList.add('correct');
    fb.textContent = '✓ 정답입니다!';
    fb.className = 'feedback show correct-fb';
  } else {
    btn.classList.add('wrong');
    fb.textContent = `✗ 오답 — 정답: ${correct}`;
    fb.className = 'feedback show wrong-fb';
    wrongItems.push(question);
  }

  document.getElementById('score-text').textContent = `점수: ${score}`;
  document.getElementById('next-btn').className = 'next-btn show';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// ──────────────────────────────────────────────
// RESULT
// ──────────────────────────────────────────────
function showResult() {
  showScreen('screen-result');
  const total = questions.length;
  const pct = score / total;

  let emoji, msg;
  if (pct === 1)      { emoji = 'かんぺき！'; msg = '만점! 완벽해요 🎉'; }
  else if (pct >= 0.8){ emoji = 'すごい！'; msg = '아주 잘했어요! 조금만 더!'; }
  else if (pct >= 0.6){ emoji = 'いいね！'; msg = '잘 하고 있어요. 복습해봐요!'; }
  else                { emoji = 'がんばれ！'; msg = '더 연습이 필요해요. 파이팅!'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-score').textContent = `${score} / ${total}`;
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('rb-correct').textContent = score;
  document.getElementById('rb-total').textContent = total;
  document.getElementById('rb-wrong').textContent = total - score;

  const wrap = document.getElementById('wrong-list-wrap');
  const list = document.getElementById('wrong-list');
  if (wrongItems.length > 0) {
    wrap.style.display = 'block';
    list.innerHTML = wrongItems.map(w=>`<span class="wrong-tag">${w}</span>`).join('');
  } else {
    wrap.style.display = 'none';
  }
}

function retryQuiz() { startQuiz(); }
function goMenu() { showScreen('screen-start'); }
</script>
</body>
</html>
